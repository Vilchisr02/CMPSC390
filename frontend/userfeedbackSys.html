<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback System</title>
    <link rel="stylesheet" href="css/feedback-style.css">
</head>
<body>
    <div class="container">
        <div class="feedback-box">
            <h1><a href="index.html">User Feedback</a></h1>
            <form action="feedback.php" method="post" id="feedback-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="username">Your Name:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                    <div id="user-email" class="user-email-display"></div>
                </div>
                
                <div class="form-group">
                    <label>Rating:</label>
                    <div class="rating-stars">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                    <input type="hidden" id="rating-value" name="rating" value="0">
                </div>
                
                <div class="form-group">
                    <label for="comment">Your Feedback:</label>
                    <textarea id="comment" name="comment" rows="4" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="image">Upload Image (optional):</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                
                <button type="submit" class="submit-btn">Submit Feedback</button>
            </form>
            
            <div class="feedback-list">
                <h2>Recent Feedback</h2>
                <div id="feedback-items"></div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2025 MarketShift. All Rights Reserved.</p>
    </footer>
    
    <script type="module" src="js/feedback-front-script.js"></script>
</body>
</html>
