<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluation System</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <h1>Evaluation System</h1>
    
    <div class="rating-form">
        <h2>submit your Evaluation</h2>
        <div id="message"></div>
        
        <form id="ratingForm">
            <div>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label>Ratings:</label>
                <select name="rating" required>
                    <option value="1">1star</option>
                    <option value="2">2star</option>
                    <option value="3">3star</option>
                    <option value="4">4star</option>
                    <option value="5">5star</option>
                </select>
            </div>
            <div>
                <label for="comment">Evaluation content:</label>
                <textarea id="comment" name="comment" rows="4"></textarea>
            </div>
            <button type="submit">Submit the review</button>
        </form>
    </div>
    
    <div class="rating-list">
        <h2>All reviews</h2>
        <div id="ratingsContainer"></div>
    </div>

    <script>
        // 加载现有评价
        function loadRatings() {
            fetch('submit.php?action=get_ratings')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('ratingsContainer');
                    if (data.length === 0) {
                        container.innerHTML = '<p>no more comment</p>';
                        return;
                    }
                    
                    let html = '';
                    data.forEach(rating => {
                        html += `
                            <div class="rating-item">
                                <h3>${escapeHtml(rating.name)}</h3>
                                <div class="rating-stars">
                                    ${'★'.repeat(rating.rating) + '☆'.repeat(5 - rating.rating)}
                                </div>
                                <p>${escapeHtml(rating.comment).replace(/\n/g, '<br>')}</p>
                                <small>${rating.created_at}</small>
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                })
                .catch(error => {
                    console.error('Failed to load reviews:', error);
                    document.getElementById('ratingsContainer').innerHTML = '<p class="error">Failed to load reviews</p>';
                });
        }

        // 提交表单
        document.getElementById('ratingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const messageEl = document.getElementById('message');
            messageEl.innerHTML = '';
            messageEl.className = '';
            
            fetch('submit.php?action=submit_rating', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    messageEl.innerHTML = data.message;
                    messageEl.className = 'success';
                    this.reset();
                    loadRatings();
                } else {
                    messageEl.innerHTML = data.message;
                    messageEl.className = 'error';
                }
            })
            .catch(error => {
                messageEl.innerHTML = 'Submission error';
                messageEl.className = 'error';
                console.error('Invalid submission:', error);
            });
        });

        // HTML转义防止XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 页面加载时获取评价
        document.addEventListener('DOMContentLoaded', loadRatings);
    </script>
</body>
</html>
